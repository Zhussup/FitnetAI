<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Чат - FitnetAI</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--bg-header);
            border-bottom: 2px solid var(--accent-primary);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo-square {
            width: 24px;
            height: 24px;
            background-color: var(--accent-primary);
            border-radius: 4px;
        }

        nav {
            display: flex;
            gap: 35px;
            margin-left: auto;
            margin-right: 40px;
        }

        nav a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s;
            padding: 5px 0;
        }

        nav a:hover {
            color: var(--accent-primary);
        }

        .auth {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-auth {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--accent-primary);
            cursor: pointer;
            background: transparent;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
        }

        .btn-auth:hover {
            background: var(--gradient-1);
        }

        .btn-auth.primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .btn-auth.primary:hover {
            background: var(--accent-secondary);
            border-color: var(--accent-secondary);
        }

        /* CHAT CONTAINER */
        .chat-container {
            flex: 1;            /* Занимает все свободное место */
            display: flex;
            flex-direction: column;
            overflow: hidden;   /* ВАЖНО: Скрываем скролл контейнера, скроллить будем #chat */
            position: relative;
            padding: 0;         /* Убираем отступ контейнера, он будет внутри #chat */
        }

        #chat {
            flex: 1;              /* Растягиваем на всю высоту */
            overflow-y: auto;     /* Скролл появляется тут */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding-bottom: 160px; /* Базовый запас, далее пересчитаем в JS */
            scroll-padding-bottom: 160px;
        }



        #chat::-webkit-scrollbar {
            width: 8px;
        }

        #chat::-webkit-scrollbar-track {
            background: var(--bg-header);
            border-radius: 10px;
        }

        #chat::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 10px;
        }

        #chat::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }

        .user {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 18px;
            max-width: 70%;
            margin-left: auto;
            align-self: flex-end;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .bot {
            background: var(--card-bg);
            border: 1px solid var(--accent-primary);
            border-radius: 12px;
            padding: 15px 18px;
            max-width: 70%;
            margin-right: auto;
            align-self: flex-start;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .typing {
            background: var(--card-bg);
            border: 1px solid var(--accent-primary);
            border-radius: 12px;
            padding: 15px 18px;
            max-width: 70%;
            margin-right: auto;
            align-self: flex-start;
            font-style: italic;
            opacity: 0.7;
            animation: typing 1.5s infinite;
            color: var(--text-primary);
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.7; }
            30% { opacity: 1; }
        }

        .bot pre {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            margin-top: 10px;
        }

        .bot table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
            font-size: 13px;
        }

        .bot table, .bot th, .bot td {
            border: 1px solid var(--border-color);
        }

        .bot th {
            background: var(--gradient-1);
            padding: 10px;
            text-align: left;
        }

        .bot td {
            padding: 8px;
        }

        /* INPUT AREA */
        .input-area {
            position: fixed;     /* Жёстко прижимаем к низу окна */
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background: var(--bg-header);
            border-top: 2px solid var(--accent-primary);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 99;
            flex-shrink: 0;
        }


        .input-wrapper {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 900px;
        }

        #msg {
            flex: 1;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        #msg:focus {
            border-color: var(--accent-primary);
        }

        #msg::placeholder {
            color: var(--text-muted);
        }

        .input-area button {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--gradient-1);
        }

        .input-area button:active {
            transform: translateY(0);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .user, .bot, .typing {
                max-width: 85%;
            }

            nav {
                gap: 20px;
                margin: 0;
            }

            header {
                padding: 12px 20px;
            }

            #msg {
                padding: 10px 12px;
                font-size: 14px;
            }

            .input-area button {
                padding: 10px 20px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            header {
                flex-direction: column;
                gap: 10px;
            }

            nav {
                gap: 15px;
                font-size: 12px;
                order: 3;
                width: 100%;
                margin: 0;
            }

            .auth {
                order: 4;
                width: 100%;
                justify-content: space-between;
            }

            .user, .bot, .typing {
                max-width: 95%;
            }

            #chat {
                padding: 12px;
            }

            .input-area {
                padding: 12px;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .input-area button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <a href="/" class="logo">
            <div class="logo-square"><img src="/static/logo.jpg" alt="logo" width="24" height="24" style="border-radius: 3px;"></div>
            FitnetAI
        </a>

        <nav>
            <a href="/">Главная</a>
            <a href="/#programs">Программы</a>
            <a href="/exercises">Упражнения</a>
            <a href="/chat">Чат</a>
        </nav>

        <div class="auth" id="authButtons">
            <a href="/login" class="btn-auth" id="loginBtn">Войти</a>
            <a href="/signin" class="btn-auth primary" id="signupBtn">Зарегистрироваться</a>
            <a href="/dashboard" class="btn-auth primary" id="profileBtn" style="display: none;">Профиль</a>
            <button onclick="logout()" class="btn-auth primary" id="logoutBtn" style="display: none;">Выход</button>
        </div>
    </header>

    <!-- CHAT CONTAINER -->
    <div class="chat-container">
        <div id="chat"></div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <div class="input-wrapper">
            <input id="msg" type="text" placeholder="Введите ваш вопрос...">
            <button onclick="send()">Отправить</button>
            <button onclick="clearChat()" style="background:#2a2a2a;border:1px solid #444;">Очистить</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        const chatBox = document.getElementById("chat");
        const input = document.getElementById("msg");

        // Отправка по Enter
        input.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        // Загрузка истории чата при загрузке страницы
        function getChatKey() {
            const email = localStorage.getItem("email");
            return email ? `chat_history_${email}` : null;
        }

        window.addEventListener("load", () => {
            const token = localStorage.getItem("token");
            const email = localStorage.getItem("email");
            if (!token || !email) {
                alert("Войдите в аккаунт, чтобы использовать чат");
                window.location.href = "/login";
                return;
            }

            const key = getChatKey();
            const saved = key ? JSON.parse(localStorage.getItem(key) || "[]") : [];
            saved.forEach(m => {
                if (m.role === "bot") {
                    chatBox.innerHTML += `<div class="bot">${marked.parse(m.text)}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="user">${m.text}</div>`;
                }
            });
            adjustChatPadding();
            scrollToBottom();
            checkAuth();
        });

        function adjustChatPadding() {
            const inputArea = document.querySelector(".input-area");
            if (!inputArea || !chatBox) return;
            const reserve = inputArea.offsetHeight + 24; // небольшой запас, чтобы сообщения не уходили под поле
            chatBox.style.paddingBottom = `${reserve}px`;
            chatBox.style.scrollPaddingBottom = `${reserve}px`;
        }

        window.addEventListener("resize", adjustChatPadding);

        function saveMessage(role, text) {
            const key = getChatKey();
            if (!key) return;
            const saved = JSON.parse(localStorage.getItem(key) || "[]");
            saved.push({ role, text });
            localStorage.setItem(key, JSON.stringify(saved));
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            // Добавляем сообщение пользователя
            chatBox.innerHTML += `<div class="user">${text}</div>`;
            saveMessage("user", text);
            adjustChatPadding();
            scrollToBottom();
            input.value = "";

            // Показываем индикатор печати
            const typingDiv = document.createElement("div");
            typingDiv.className = "typing";
            typingDiv.innerText = "Бот печатает...";
            chatBox.appendChild(typingDiv);
            scrollToBottom();

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${localStorage.getItem("token") || ""}`
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await res.json();
                if (res.status === 401) {
                    typingDiv.remove();
                    chatBox.innerHTML += `<div class="bot">Требуется войти в систему</div>`;
                    adjustChatPadding();
                    scrollToBottom();
                    return;
                }
                const reply = data.reply || "Ошибка: нет ответа от сервера";

                typingDiv.remove();
                chatBox.innerHTML += `<div class="bot">${marked.parse(reply)}</div>`;
                saveMessage("bot", reply);
                adjustChatPadding();
                scrollToBottom();

            } catch (err) {
                typingDiv.remove();
                chatBox.innerHTML += `<div class="bot">Ошибка соединения с сервером</div>`;
                adjustChatPadding();
                scrollToBottom();
            }
        }

        function clearChat() {
            if (!confirm("Очистить чат?")) return;
            const key = getChatKey();
            if (key) localStorage.removeItem(key);
            chatBox.innerHTML = "";
            adjustChatPadding();
        }

        function checkAuth() {
            const token = localStorage.getItem("token");
            const loginBtn = document.getElementById("loginBtn");
            const signupBtn = document.getElementById("signupBtn");
            const profileBtn = document.getElementById("profileBtn");
            const logoutBtn = document.getElementById("logoutBtn");

            if (token) {
                if (loginBtn) loginBtn.style.display = "none";
                if (signupBtn) signupBtn.style.display = "none";
                if (profileBtn) profileBtn.style.display = "inline-flex";
                if (logoutBtn) logoutBtn.style.display = "inline-flex";
            } else {
                if (loginBtn) loginBtn.style.display = "inline-flex";
                if (signupBtn) signupBtn.style.display = "inline-flex";
                if (profileBtn) profileBtn.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("email");
            localStorage.removeItem("selectedProgram");
            alert("Вы вышли из системы");
            window.location.href = "/";
        }
    </script>

</body>

</html>
