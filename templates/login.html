<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход</title>
<link rel="icon" type="image/jpeg" href="/static/logo.jpg">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 20px;
    }
    
    .form-container {
        background: white;
        padding: 50px 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 420px;
        position: relative;
    }
    
    .logo-section {
        text-align: center;
        margin-bottom: 35px;
    }

    .logo-section h1 {
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
    }

    .logo-section p {
        color: #64748b;
        font-size: 15px;
    }
    
    .form-box h2 {
        text-align: center;
        color: #1e293b;
        margin-bottom: 30px;
        font-size: 26px;
        font-weight: 600;
    }

    .input-group {
        position: relative;
        margin-bottom: 25px;
    }

    .input-group label {
        display: block;
        color: #475569;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
    }
    
    .form-box input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        background: #f8fafc;
        color: #1e293b;
        font-size: 15px;
        transition: all 0.3s ease;
    }
    
    .form-box input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .form-box input::placeholder {
        color: #94a3b8;
    }
    
    .form-box button {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .form-box button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .form-box button:active {
        transform: translateY(0);
    }
    
    .form-box p {
        text-align: center;
        margin-top: 25px;
        color: #64748b;
        font-size: 14px;
    }
    
    .form-box a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }
    
    .form-box a:hover {
        color: #764ba2;
        text-decoration: underline;
    }
    
    .error {
        background: #fee2e2;
        color: #dc2626;
        text-align: center;
        margin-top: 15px;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        display: none;
        border: 1px solid #fecaca;
    }

    @media (max-width: 480px) {
        .form-container {
            padding: 35px 25px;
        }

        .logo-section h1 {
            font-size: 26px;
        }
    }
</style>
</head>
<body>

<div class="form-container">
    <div class="logo-section">
        <h1>FitnetAI</h1>
        <p>С возвращением!</p>
    </div>
    
    <div class="form-box">
        <div class="input-group">
            <label for="login_email">Email</label>
            <input id="login_email" type="email" placeholder="your@email.com">
        </div>
        <div class="input-group">
            <label for="login_pass">Пароль</label>
            <input id="login_pass" type="password" placeholder="••••••••">
        </div>
        <button onclick="login()">Войти</button>
        <div class="error" id="error"></div>
        <p>Нет аккаунта? <a href="/signin">Зарегистрироваться</a></p>
    </div>
</div>

<script>
const ADMIN_EMAIL = "admin.athletix@gmail.com";

async function login() {
    const email = document.getElementById("login_email").value;
    const password = document.getElementById("login_pass").value;
    const errorDiv = document.getElementById("error");
    
    errorDiv.style.display = "none";
    
    if (!email || !password) {
        errorDiv.textContent = "Заполните все поля";
        errorDiv.style.display = "block";
        return;
    }

    try {
        const res = await fetch("/api/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, password})
        });

        const data = await res.json();
        
        if (res.ok) {
            localStorage.setItem("token", data.access_token);
            localStorage.setItem("email", email);
            alert("Успешный вход!");
            window.location.href = email === ADMIN_EMAIL ? "/admin" : "/form";
        } else {
            errorDiv.textContent = data.detail;
            errorDiv.style.display = "block";
        }
    } catch (e) {
        errorDiv.textContent = "Ошибка сервера";
        errorDiv.style.display = "block";
    }
}

// Check if already logged in
window.addEventListener("load", () => {
    const token = localStorage.getItem("token");
    const email = localStorage.getItem("email");
    if (token) {
        window.location.href = email === ADMIN_EMAIL ? "/admin" : "/dashboard";
    }
});
</script>

</body>
</html>
