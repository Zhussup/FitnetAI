<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки аккаунта - FitnetAI</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <link rel="stylesheet" href="/static/theme.css">
    <script src="/static/theme.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        header {
            background-color: var(--bg-header);
            border-bottom: 2px solid var(--accent-primary);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo img {
            width: 24px;
            height: 24px;
            border-radius: 3px;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover,
        nav a.active {
            color: var(--accent-primary);
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-primary);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--accent-primary);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: var(--accent-primary);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--shadow-accent);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 59, 0, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background: var(--accent-primary);
            color: white;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            color: #4CAF50;
        }

        .message.error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .divider {
            height: 1px;
            background: var(--border-color);
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <img src="/static/logo.jpg" alt="logo">
            FitnetAI
        </a>
        <nav>
            <a href="/">Главная</a>
            <a href="/exercises">Упражнения</a>
            <a href="/chat">Чат</a>
            <a href="/dashboard">Профиль</a>
            <a href="/history">История</a>
            <a href="/training-schedule">Расписание</a>
            <a href="/training-program">Программа</a>
            <a href="/settings" class="active">Настройки</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h1>Настройки аккаунта</h1>

            <!-- Change Password -->
            <div class="form-group">
                <label>Изменить пароль</label>
                <input type="password" id="currentPassword" placeholder="Текущий пароль">
            </div>
            <div class="form-group">
                <input type="password" id="newPassword" placeholder="Новый пароль">
            </div>
            <button class="btn" onclick="updatePassword()">Изменить пароль</button>
            <div id="passwordMessage" class="message"></div>

            <div class="divider"></div>

            <!-- Change Email -->
            <div class="form-group">
                <label>Изменить email</label>
                <input type="email" id="newEmail" placeholder="Новый email">
            </div>
            <div class="form-group">
                <input type="password" id="emailPassword" placeholder="Пароль для подтверждения">
            </div>
            <button class="btn" onclick="updateEmail()">Изменить email</button>
            <div id="emailMessage" class="message"></div>

            <a href="/dashboard" class="btn btn-secondary" style="text-decoration: none; display: block; text-align: center;">Вернуться в профиль</a>
        </div>
    </div>

    <script>
        async function updatePassword() {
            const currentPassword = document.getElementById("currentPassword").value;
            const newPassword = document.getElementById("newPassword").value;
            const msgEl = document.getElementById("passwordMessage");
            
            if (!currentPassword || !newPassword) {
                msgEl.textContent = "Заполните все поля";
                msgEl.className = "message error";
                msgEl.style.display = "block";
                return;
            }
            
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "/login";
                return;
            }
            
            try {
                const res = await fetch("/api/user/password", {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ current_password: currentPassword, new_password: newPassword })
                });
                
                const data = await res.json();
                msgEl.style.display = "block";
                
                if (res.ok) {
                    msgEl.textContent = "✓ Пароль успешно изменен";
                    msgEl.className = "message success";
                    document.getElementById("currentPassword").value = "";
                    document.getElementById("newPassword").value = "";
                } else {
                    msgEl.textContent = "✗ " + (data.detail || "Ошибка");
                    msgEl.className = "message error";
                }
                
                setTimeout(() => msgEl.style.display = "none", 5000);
            } catch (e) {
                msgEl.style.display = "block";
                msgEl.textContent = "✗ Ошибка сети";
                msgEl.className = "message error";
            }
        }

        async function updateEmail() {
            const newEmail = document.getElementById("newEmail").value;
            const password = document.getElementById("emailPassword").value;
            const msgEl = document.getElementById("emailMessage");
            
            if (!newEmail || !password) {
                msgEl.textContent = "Заполните все поля";
                msgEl.className = "message error";
                msgEl.style.display = "block";
                return;
            }
            
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "/login";
                return;
            }
            
            try {
                const res = await fetch("/api/user/email", {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ new_email: newEmail, password: password })
                });
                
                const data = await res.json();
                msgEl.style.display = "block";
                
                if (res.ok) {
                    msgEl.textContent = "✓ Email успешно изменен";
                    msgEl.className = "message success";
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("email", newEmail);
                    document.getElementById("newEmail").value = "";
                    document.getElementById("emailPassword").value = "";
                } else {
                    msgEl.textContent = "✗ " + (data.detail || "Ошибка");
                    msgEl.className = "message error";
                }
                
                setTimeout(() => msgEl.style.display = "none", 5000);
            } catch (e) {
                msgEl.style.display = "block";
                msgEl.textContent = "✗ Ошибка сети";
                msgEl.className = "message error";
            }
        }

        window.addEventListener("load", () => {
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "/login";
            }
        });
    </script>
</body>
</html>
