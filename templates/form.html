<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: white;
            padding: 20px 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
        }

        .logo span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        nav a {
            color: #475569;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #667eea;
        }

        nav button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        nav button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .form-section {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .form-container h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 35px;
            font-size: 28px;
            font-weight: 600;
        }

        .field {
            position: relative;
            margin-bottom: 30px;
        }

        .field label {
            display: block;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
            color: #1e293b;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .field input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .field input::placeholder {
            color: #94a3b8;
        }

        .field span {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 15px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .field input:focus + span,
        .field input:not(:placeholder-shown) + span {
            display: none;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .buttons button,
        .buttons a {
            text-decoration: none;
            display: inline-block;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .buttons button:hover,
        .buttons a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .success-message {
            background: #d1fae5;
            color: #059669;
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            display: none;
            font-weight: 600;
            border: 1px solid #a7f3d0;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            display: none;
            font-weight: 600;
            border: 1px solid #fecaca;
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
            }

            .form-container {
                padding: 35px 25px;
            }

            nav {
                gap: 15px;
            }

            .buttons {
                flex-direction: column;
            }

            .buttons button,
            .buttons a {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <header class="top">
        <div class="logo">Athlet<span>ixAI</span></div>

        <nav>
            <a href="/">Главная</a>
            <a href="/exercises">Упражнения</a>
            <a href="/chat">Чат</a>
            <a href="/dashboard">Профиль</a>
            <a href="/history">История</a>
            <a href="/training-schedule">Расписание</a>
            <a href="/training-program">Программа</a>
            <a href="/settings">Настройки</a>
            <button onclick="logout()" id="logoutBtn" style="display: none;">Выход</button>
        </nav>
    </header>

    <section class="form-section">
        <div class="form-container">
            <h2>Расскажите о себе</h2>
            
            <div class="field">
                <label for="gender">Пол</label>
                <input type="text" id="gender" placeholder="М или Ж">
            </div>

            <div class="field">
                <label for="age">Возраст</label>
                <input type="number" id="age" placeholder="Введите ваш возраст">
            </div>

            <div class="field">
                <label for="height">Рост (см)</label>
                <input type="number" id="height" placeholder="Например: 175">
            </div>

            <div class="field">
                <label for="weight">Вес (кг)</label>
                <input type="number" id="weight" placeholder="Например: 70">
            </div>

            <div class="success-message" id="successMessage">✓ Данные успешно сохранены</div>
            <div class="error-message" id="errorMessage"></div>

            <div class="buttons">
                <button onclick="submitForm()">Сохранить данные</button>
                <a href="/dashboard">Перейти в профиль</a>
            </div>
        </div>
    </section>

    <script>
        // Check if user is logged in
        function checkAuth() {
            const token = localStorage.getItem("token");
            if (!token) {
                alert("Пожалуйста, сначала зарегистрируйтесь или войдите");
                window.location.href = "/signin";
            }
        }

        async function submitForm() {
            const gender = document.getElementById("gender").value;
            const age = document.getElementById("age").value;
            const height = document.getElementById("height").value;
            const weight = document.getElementById("weight").value;
            const email = localStorage.getItem("email");
            const successDiv = document.getElementById("successMessage");
            const errorDiv = document.getElementById("errorMessage");

            successDiv.style.display = "none";
            errorDiv.style.display = "none";

            // Validation
            if (!gender || !age || !height || !weight) {
                errorDiv.textContent = "Заполните все поля";
                errorDiv.style.display = "block";
                return;
            }

            if (!email) {
                errorDiv.textContent = "Ошибка: email не найден. Пожалуйста, перезагрузитесь";
                errorDiv.style.display = "block";
                return;
            }

            try {
                const res = await fetch("/api/form-submit", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        email,
                        gender,
                        age: parseInt(age),
                        height: parseFloat(height),
                        weight: parseFloat(weight)
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    successDiv.style.display = "block";
                    setTimeout(() => {
                        window.location.href = "/dashboard";
                    }, 1500);
                } else {
                    errorDiv.textContent = data.detail || "Ошибка сохранения";
                    errorDiv.style.display = "block";
                }
            } catch (e) {
                errorDiv.textContent = "Ошибка сервера: " + e.message;
                errorDiv.style.display = "block";
            }
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("email");
            alert("Вы вышли из системы");
            window.location.href = "/";
        }

        function updateAuthUI() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.style.display = "inline-block";
            }
        }

        // Check auth on page load
        window.addEventListener("load", () => {
            checkAuth();
            updateAuthUI();
        });
    </script>

</body>

</html>
